set-option -as terminal-overrides ',xterm*:Tc'
set-option -as terminal-features ',xterm-kitty:RGB:extkeys'
set -s extended-keys always
set-option -g allow-passthrough on
unbind C-b
set-option -g prefix C-SPACE
bind-key C-SPACE send-prefix
bind r source-file ~/.config/tmux/tmux.conf

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# set-option remain-on-exit on
set -g renumber-windows on           # renumber all windows when any window is closed
set -sg escape-time 0                # zero-out escape time delay
set -sg repeat-time 0                # more responsive pane switching
set -g detach-on-destroy off         # Stay in tmux when session closes
set -g mouse off                     # Mouse-mode interferes with native terminal selection
set -g bell-action none              # Ignore activity alerts
set -g monitor-activity off          # Disable activity notifications
set -g visual-bell off               # Get rid off screen flashes
set -g monitor-silence 0             # Disable silence alerts
#set -g status off                   # Hide the status bar
set-window-option -g mode-keys vi

# style
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style 'fg=colour3 bg=default'
setw -g popup-border-lines none

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -g status-left "#{?client_prefix,#[bg=default]#[fg=colour6],#[bg=default]#[fg=colour1]}  #S #[default]"
#set -ga status-left "#[fg=colour1]#[bg=colour1]#[fg=colour0]#[bold]  #S #[nobold]#[fg=colour1]#[bg=default] " # left bubble: session
set -ga status-left "#[bg=default,fg=colour0,none]│"
set -ga status-left "#[bg=default,fg=colour12]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=colour0,none]│"
set -ga status-left "#[bg=default,fg=colour2]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=colour0,none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=colour13]#{?window_zoomed_flag,  zoom ,}"
set -ga status-left "#[bg=default,fg=colour0,none]│"
set -ga status-left "#{?client_prefix,#[fg=colour3 bold] PREFIX ,#{?#{==:#{pane_mode},copy-mode},#[fg=colour3 bold] COPY ,#[fg=colour6 bold] NORMAL }}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[fg=colour13]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") " 
set -ga status-right "#[bg=default,fg=colour0,none]│"
set -ga status-right "#[fg=colour4] #H "
set -ga status-right "#[bg=default,fg=colour0,none]│"
set -ga status-right "#[fg=colour3] 󰭦 %Y-%m-%d 󰅐 %H:%M "
#set -g status-right '#{?client_prefix,#[fg=colour6]#[bg=colour6]#[fg=colour0]#[bold] PREFIX #[nobold]#[fg=colour6]#[bg=default] ,}#[fg=colour13]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=colour4] #H #[fg=colour3] %Y-%m-%d %H:%M ' # right bubble PREFIX

# window status look and feel
set -g window-status-format ' #[fg=colour1]#I #[fg=colour8]#W '
# Only color indicator variant
#setw -g window-status-current-format "#{?window_zoomed_flag,#[fg=colour13]#[bg=colour13]#[fg=colour0],#[fg=colour1]#[bg=colour1]#[fg=colour0]#[bold]} #W #{?window_zoomed_flag,#[fg=colour13]#[bg=default],#[fg=colour1]#[nobold]#[fg=colour1]#[bg=default]}"
#setw -g window-status-current-format "#{?client_prefix,#[fg=colour3]#[bg=colour3]#[fg=colour0],#[fg=colour1]#[bg=colour1]#[fg=colour0]#[bold]} #W #{?client_prefix,#[fg=colour3]#[bg=default],#[fg=colour1]#[nobold]#[fg=colour1]#[bg=default]}"
# Visual indicator variant
#setw -g window-status-current-format "#{?client_prefix,#[fg=colour3 bold] PREFIX ,#{?#{==:#{pane_mode},copy-mode},#[fg=colour3 bold] COPY ,#[fg=colour1]#[bg=colour1]#[fg=colour0]#[bold] #W #[fg=colour1]#[nobold]#[fg=colour1]#[bg=default]}}"
setw -g window-status-current-format "#{?client_prefix,#[fg=colour6]#[bg=colour6]#[fg=colour0]#[bold] PREFIX #[nobold]#[fg=colour6]#[bg=default],#{?#{==:#{window_zoomed_flag},1},#[fg=colour13]#[bg=colour13]#[fg=colour0]#[bold]  zoom #[fg=colour1]#[nobold]#[fg=colour13]#[bg=default],#[fg=colour1]#[bg=colour1]#[fg=colour0]#[bold] #W #[fg=colour1]#[nobold]#[fg=colour1]#[bg=default]}}"
#setw -g window-status-current-format "#{?client_prefix,#[fg=colour3 bold] PREFIX ,#{?#{==:#{window_zoomed_flag},1},#[fg=colour13 bold]  zoom ,#[fg=colour1]#[bg=colour1]#[fg=colour0]#[bold] #W #[fg=colour1]#[nobold]#[fg=colour1]#[bg=default]}}"

# Vim-style visual mode
bind  k copy-mode
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

# Scripts that are baked into tmux
bind-key -n M-e run-shell "tmux neww tmux-sessionizer"
bind-key -n M-i run-shell "~/.config/tmux/scripts/jump-w-prev.sh"
bind-key -n M-w run-shell "~/.config/tmux/scripts/tmux-pane-switch.sh"
#bind-key -n M-w run-shell "~/.config/tmux/scripts/jump-s-prev.sh"
bind-key -n M-n run-shell "~/.config/tmux/scripts/neww.sh"
bind-key -n M-m popup -B -d "#{pane_current_path}" -E "~/.config/tmux/scripts/tmx-rename-window.sh"
bind-key -n M-1 run-shell "~/.config/tmux/scripts/clipboard.sh"
#bind-key -n M-1 run-shell 'cliphist list | fzf --tmux 75% | cliphist decode | wl-copy'
bind-key -n M-2 popup -h 70% -w 50% -B -d "#{pane_current_path}" -E "yt-x"
bind-key -n M-3 popup -h 65% -w 60% -B -d "#{pane_current_path}" -E "~/.config/tmux/scripts/show-tmux-popup.sh"
bind-key -T popup M-3 detach
bind-key -n M-j select-window -p
bind-key -n M-k select-window -n
bind-key -n M-q "kill-pane"
bind-key -n M-c "kill-window"
unbind z
bind -n M-d resize-pane -Z
bind b set-option status

# Split panes
bind-key -n  M-z split-window -v -c "#{pane_current_path}"
bind-key -n  M-x split-window -h -c "#{pane_current_path}"

# Pane switching
bind-key -n M-H select-pane -L
bind-key -n M-J select-pane -D
bind-key -n M-K select-pane -U
bind-key -n M-L select-pane -R

# Pane switching
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -T copy-mode-vi M-H select-pane -L
bind-key -T copy-mode-vi M-J select-pane -D
bind-key -T copy-mode-vi M-K select-pane -U
bind-key -T copy-mode-vi M-L select-pane -R

# Quick sessions cycling
unbind C-j
unbind C-k
bind-key -n C-j switch-client -p
bind-key -n C-k switch-client -n

# Bind 'Prefix + f' to fuzzy search the scrollback buffer
bind -n M-f capture-pane -S -32768 \; save-buffer /tmp/tmux-buffer \; new-window "fzf --tmux 75% < /tmp/tmux-buffer"
