#font_family      family="JetBrainsMono Nerd Font" style=Medium
#font_family      family="CaskaydiaCove Nerd Font" style=Regular
#font_family      family="VictorMono Nerd Font" style=Medium
#font_family      family="Maple Mono NF" style=Medium
font_family      family="Annotation Mono" style=DemiBold
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14.0
window_padding_width 0
window_margin_width 0
include theme.conf
background_opacity 0.65
#background_blur 1
#hide_window_decorations yes
confirm_os_window_close 0

cursor_trail 10
cursor_trail_start_threshold 0
cursor_trail_decay 0.1 0.5
cursor none

# Performance
repaint_delay 0
input_delay 0
sync_to_monitor no
wayland_enable_ime no

# Terminal bell
enable_audio_bell no

# Respect the cursor shape set by kitty.
cursor_shape_unfocused hollow
